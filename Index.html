  input,select,button,textarea{font-family:inherit;font-size:16px;color:var(--tinta)}

  header{position:sticky;top:0;z-index:20;background:var(--crema);border-bottom:1px solid var(--line);
    display:flex;align-items:center;gap:10px;padding:11px 16px}
  header .mark{width:42px;height:28px}
  header .w{font-family:var(--serif);font-size:22px;letter-spacing:.13em;font-weight:500}
  header .right{margin-left:auto;display:flex;align-items:center;gap:8px}
  .chip{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:999px;
    padding:9px 13px;font-size:12px;font-weight:500;letter-spacing:.11em;text-transform:uppercase;cursor:pointer;background:var(--sand)}
  .chip.plain{background:transparent}
  .chip.on{background:var(--tinta);color:var(--crema);border-color:var(--tinta)}

  .wrap{max-width:680px;margin:0 auto;padding:16px}
  h2.sec{margin:6px 0 12px;font-family:var(--sans);font-weight:500;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
  .field{margin-bottom:12px}
  .field label{display:block;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin:0 0 5px 1px}
  .field input,.field select{width:100%;padding:14px;border:1px solid var(--line);border-radius:11px;background:var(--crema);outline:none}
  .field input:focus,.field select:focus{border-color:var(--tinta)}
  .row{display:flex;gap:10px}.row>*{flex:1}
  .btn{border:none;border-radius:10px;padding:15px 18px;font-weight:500;font-size:16px;letter-spacing:.02em;cursor:pointer;
    background:var(--tinta);color:var(--crema)}
  .btn.block{width:100%}
  .btn.ghost{background:transparent;color:var(--tinta);border:1px solid var(--line)}
  .btn:active{opacity:.85}

  .search{display:flex;align-items:center;gap:10px;border:1px solid var(--line);border-radius:12px;padding:14px 15px;margin-bottom:16px;background:var(--crema)}
  .search input{border:none;background:none;outline:none;flex:1;padding:0}
  .icobtn{width:24px;height:24px;flex:0 0 24px;border:1.5px solid var(--tinta);border-radius:6px;background:none;position:relative;cursor:pointer}
  .icobtn::before{content:"";position:absolute;left:4px;right:4px;top:50%;height:1.5px;background:var(--tinta);transform:translateY(-.75px)}

  .card{border-top:1px solid var(--soft);padding:18px 2px}
  .card:first-child{border-top:0}
  .card .top{display:flex;gap:12px}
  .thumb{width:62px;height:62px;flex:0 0 62px;border-radius:8px;background:var(--taupe);object-fit:cover;
    display:flex;align-items:center;justify-content:center;color:var(--crema);font-family:var(--serif);font-size:21px;letter-spacing:.04em}
  .ref{font-weight:500;font-size:18px;line-height:1.25}
  .var{color:var(--muted);font-size:14px;margin-top:2px}
  .code{font-family:ui-monospace,Menlo,monospace;font-size:11.5px;letter-spacing:.04em;color:var(--faint);margin-top:3px}
  .ubic{font-size:11.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-top:6px}
  .tag{display:inline-block;font-size:10.5px;font-weight:500;letter-spacing:.11em;text-transform:uppercase;border-radius:999px;padding:2px 7px;margin-left:6px;vertical-align:middle}
  .tag.bajo{color:var(--rojo);border:1px solid var(--rojo)}
  .tag.est{color:var(--taupe);border:1px solid rgba(164,120,101,.5)}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
  .sc{font-size:13px;letter-spacing:.03em;padding:6px 11px;border-radius:999px;background:var(--sand);color:var(--muted)}
  .sc.cur{background:var(--tinta);color:var(--crema)}
  .sc b{font-weight:500;color:inherit}
  .acts{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-top:12px;justify-content:flex-end}
  .lnk{font-size:12.5px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);cursor:pointer;padding:7px 4px}
  .step{width:44px;height:44px;border:1px solid var(--line);border-radius:10px;background:var(--crema);font-size:22px;cursor:pointer;line-height:1}
  .sell{padding:12px 18px;border:none;border-radius:10px;background:var(--tinta);color:var(--crema);font-weight:500;font-size:15px;cursor:pointer}

  .empty{text-align:center;color:var(--muted);padding:48px 20px;font-family:var(--serif);font-size:20px;font-style:italic}
  .num{font-family:var(--serif);font-weight:500;line-height:1}
  .kpis{display:grid;grid-template-columns:1fr 1fr;gap:0;border:1px solid var(--line);border-radius:14px;overflow:hidden;margin-bottom:16px}
  .kpi{padding:18px 17px;border-top:1px solid var(--soft);border-left:1px solid var(--soft)}
  .kpi:nth-child(1),.kpi:nth-child(2){border-top:0}
  .kpi:nth-child(odd){border-left:0}
  .kpi.wide{grid-column:1/-1;border-left:0}
  .kpi .num{font-size:32px;margin-top:6px}
  .kpi.wide .num{font-size:42px}
  .kpi .k-sub{font-size:12.5px;color:var(--muted);margin-top:5px}

  .sederow{display:flex;border:1px solid var(--line);border-radius:14px;overflow:hidden;margin-bottom:16px}
  .sederow .s{flex:1;padding:15px 15px}
  .sederow .s + .s{border-left:1px solid var(--soft)}
  .sederow .s .num{font-size:29px;margin-top:5px}
  .sederow .s .sv{font-size:12.5px;color:var(--muted);margin-top:3px}

  .mini{display:flex;align-items:baseline;justify-content:space-between;gap:12px;padding:15px 2px;border-top:1px solid var(--soft);cursor:pointer}
  .mini .m-ref{font-weight:500;font-size:16px}.mini .m-sub{font-size:12px;color:var(--muted);margin-top:2px}
  .mini .m-n{font-family:var(--serif);font-size:25px;font-weight:500}

  nav{position:fixed;bottom:0;left:0;right:0;background:var(--crema);border-top:1px solid var(--line);display:flex;z-index:30;padding-bottom:env(safe-area-inset-bottom)}
  nav button{flex:1;background:none;border:none;padding:15px 2px 17px;cursor:pointer;position:relative;
    font-family:var(--sans);font-weight:500;font-size:11.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
  nav button.on{color:var(--tinta)}
  nav button.on::before{content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);width:22px;height:2px;background:var(--rojo)}

  .toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);background:var(--tinta);color:var(--crema);
    padding:13px 20px;border-radius:10px;font-size:15px;z-index:80;max-width:90%;text-align:center;border:1px solid var(--tinta)}
  .toast.crit{background:var(--rojo);border-color:var(--rojo)}
  .overlay{position:fixed;inset:0;background:rgba(26,26,24,.82);z-index:70;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
  #reader{width:100%;max-width:360px;border-radius:14px;overflow:hidden;background:#000}
  .spin{width:20px;height:20px;border:2px solid var(--line);border-top-color:var(--rojo);border-radius:50%;animation:sp 1s linear infinite;margin:34px auto}
  @keyframes sp{to{transform:rotate(360deg)}}
  .modal{position:fixed;inset:0;background:rgba(26,26,24,.5);z-index:75;display:flex;align-items:flex-end;justify-content:center}
  .modal .sheet{background:var(--crema);width:100%;max-width:680px;border-radius:18px 18px 0 0;padding:22px 18px calc(22px + env(safe-area-inset-bottom));max-height:88vh;overflow:auto}
  .modal h3{font-family:var(--serif);font-weight:500;font-size:26px;margin-bottom:14px}
  .hist{max-height:58vh;overflow:auto}
  .hrow{display:flex;gap:12px;align-items:center;padding:11px 2px;border-top:1px solid var(--soft)}
  .hrow .ht{width:74px;font-size:9px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
  .hrow .ht.s{color:var(--rojo)}
  .hrow .hm{flex:1;min-width:0}.hrow .hf{font-size:11px;color:var(--muted);margin-top:2px}
  .hrow .hq{font-family:var(--serif);font-size:17px;font-weight:500}
  table.t{width:100%;border-collapse:collapse}
  table.t th{font-size:10.5px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);text-align:left;padding:8px 6px;border-bottom:1px solid var(--line)}
  table.t td{padding:11px 6px;border-bottom:1px solid var(--soft);font-size:14.5px}
  table.t td.n,table.t th.n{text-align:right;font-variant-numeric:tabular-nums}
  .selrow{display:flex;align-items:center;gap:12px;padding:12px 2px;border-top:1px solid var(--soft)}
  .selrow input[type=checkbox]{width:20px;height:20px;accent-color:var(--rojo)}
  .toolbar{display:flex;gap:8px;margin-bottom:14px}
  .hidden{display:none}
  #print-area{display:none}
  .labels{display:grid;grid-template-columns:repeat(3,1fr);gap:6mm}
  .label{border:1px dashed #b9a; border-color:var(--line);border-radius:5px;padding:6px;text-align:center;page-break-inside:avoid}
  .label .l-ref{font-family:var(--serif);font-size:12px;font-weight:500}.label .l-var{font-size:10px;color:#333}.label .l-price{font-size:11px;font-weight:500;margin-top:2px}.label svg{width:100%;height:auto}
  @media print{ body{background:#fff;padding:0} header,nav,.wrap>section,.toast,.modal,.overlay{display:none!important} #print-area{display:block!important;padding:8mm} }
</style>

<div class="wrap">

  <!-- BUSCAR -->

        <button class="btn ghost" style="flex:0 0 52px" onclick="abrirScanner(function(v){document.getElementById('mv-cod').value=v;pintaRefMov();})">◲</button></div>
      <div id="mv-ref" style="font-size:12.5px;color:var(--muted);margin-top:7px"></div>

      <div class="field"><label>Tipo</label><select id="mv-tipo" onchange="mvTipo()"><option value="Entrada">Entrada</option><option value="Salida">Salida</option></select></div>

    <div class="empty" style="margin-top:14px">¿Es una venta? Usa 🛒 <span class="lnk" onclick="abrirCarrito('')">Nueva venta</span> en Buscar — así se emite el comprobante SUNAT.</div>

  <!-- AGREGAR -->

      <div class="row"><div class="field"><label>Talla</label><select id="ag-talla"></select></div><div class="field"><label>Color</label><select id="ag-color"></select></div></div>
      <div class="row"><div class="field"><label>Marca</label><select id="ag-marca"></select></div><div class="field"><label>Temporada</label><select id="ag-temp"></select></div></div>
      <div class="field"><label>Proveedor</label><select id="ag-prov"></select></div>

        <div class="field"><label>Precio S/</label><input id="ag-precio" type="number" inputmode="decimal" min="0" value="0"></div>
        <div class="field"><label>Oferta S/</label><input id="ag-oferta" type="number" inputmode="decimal" min="0" value="0"></div></div>
      <div class="field"><label>Ubicación</label><input id="ag-ubic" placeholder="Ej. 3er piso E-B3 · Vitrina"></div>
      <div class="field"><label>Stock mínimo</label><input id="ag-min" type="number" inputmode="numeric" min="0" value="3"></div>
      <div class="field"><label>Foto (enlace)</label><input id="ag-foto" placeholder="https://…"></div>
      <div class="field"><label>Código de barras (opcional)</label><input id="ag-cod" placeholder="Vacío = se genera solo"></div>
      <div class="field"><label>Stock inicial en <span id="ag-sedeLbl"></span></label><input id="ag-ini" type="number" inputmode="numeric" min="0" value="0"></div>

<nav>
  <button data-tab="inicio" class="on" onclick="irA('inicio')">Inicio</button>
  <button data-tab="buscar" onclick="irA('buscar')">Buscar</button>
  <button data-tab="mover" onclick="irA('mover')">Mover</button>
  <button data-tab="agregar" onclick="irA('agregar')">Agregar</button>
  <button data-tab="etiquetas" onclick="irA('etiquetas')">Etiq.</button>
  <button data-tab="alertas" onclick="irA('alertas')">Alertas<span id="alertN"></span></button>
</nav>

<script>
var BOOT=null,CAT=[],SEDES=[],TAB='inicio';
var SEDE=localStorage.getItem('cayla_sede')||'',USUARIO=localStorage.getItem('cayla_user')||'',PIN=sessionStorage.getItem('cayla_pin')||'';
var ES_LIDER=false,scanner=null,SEL={};

function run(fn){var a=[].slice.call(arguments,1);return new Promise(function(res,rej){google.script.run.withSuccessHandler(res).withFailureHandler(function(e){rej(e);})[fn].apply(google.script.run,a);});}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function money(n){n=Number(n)||0;try{return n.toLocaleString('es-PE',{style:'currency',currency:'PEN',maximumFractionDigits:2});}catch(e){return 'S/ '+n.toFixed(2);}}
function toast(m,crit){var t=document.createElement('div');t.className='toast'+(crit?' crit':'');t.textContent=m;document.body.appendChild(t);setTimeout(function(){t.remove();},2800);}
function opt(id,arr,sel){var el=document.getElementById(id);if(el)el.innerHTML=(arr||[]).map(function(v){return '<option'+(v===sel?' selected':'')+'>'+esc(v)+'</option>';}).join('');}
function rol(nombre){var m=(BOOT&&BOOT.equipo||[]).filter(function(x){return x.nombre===nombre;})[0];return m?m.rol:'Integrante';}

window.addEventListener('load',function(){
  run('getBootstrap').then(function(b){
    BOOT=b;SEDES=b.sedes||[];if(SEDES.indexOf(SEDE)<0)SEDE='';
    llenar();
    if(!SEDE)pedirSede(true);else pintarSede();
    if(!USUARIO)pedirUsuario();else pintarWho();
    if(PIN)run('validarPin',PIN).then(function(r){if(r.ok&&String(r.rol).toLowerCase().charAt(0)==='l')ES_LIDER=true;pintarLock();});
    // landing por rol
    if(USUARIO && String(rol(USUARIO)).toLowerCase().charAt(0)==='l'){TAB='inicio';} else {TAB='buscar';}
    cargar(function(){irA(TAB);});
  }).catch(function(e){toast('Error al iniciar: '+(e.message||e),true);});
});

function llenar(){var L=BOOT.listas||{};opt('mv-sede',SEDES,SEDE);opt('ag-cat',L.categorias);opt('ag-gen',L.generos);opt('ag-talla',L.tallas);opt('ag-color',L.colores);opt('ag-marca',L.marcas);opt('ag-temp',L.temporadas);opt('ag-prov',[''].concat(L.proveedores||[]));mvTipo();}
function cargar(cb){return run('getCatalogo').then(function(d){CAT=d||[];var b=CAT.filter(function(p){return p.bajo;}).length;document.getElementById('alertN').textContent=b?' ('+b+')':'';renderActual();if(cb)cb();}).catch(function(e){toast('Error cargando catálogo',true);});}

function pintarSede(){document.getElementById('sedeLbl').textContent=SEDE||'—';var s=document.getElementById('mv-sede');if(s)s.value=SEDE;var a=document.getElementById('ag-sedeLbl');if(a)a.textContent=SEDE;}
function pintarWho(){document.getElementById('whoBtn').textContent=USUARIO||'Entrar';}
function pintarLock(){var b=document.getElementById('lockBtn');b.classList.toggle('on',ES_LIDER);b.textContent=ES_LIDER?'Líder ✓':'Líder';document.getElementById('ag-lock').classList.toggle('hidden',ES_LIDER);document.getElementById('ag-form').classList.toggle('hidden',!ES_LIDER);}
function pedirSede(ini){var n=prompt('¿En qué sede estás?\nOpciones: '+SEDES.join(', '),SEDE||SEDES[0]||'');if(n&&SEDES.indexOf(n.trim())>=0){SEDE=n.trim();localStorage.setItem('cayla_sede',SEDE);pintarSede();if(CAT.length)renderActual();}else if(n){toast('Sede no válida',true);if(ini)setTimeout(pedirSede,300);}}
function pedirUsuario(){var eq=(BOOT&&BOOT.equipo||[]).filter(function(m){return m.sede===SEDE;}).map(function(m){return m.nombre;});var n=prompt('¿Quién eres?'+(eq.length?'\nEquipo '+SEDE+': '+eq.join(', '):''),USUARIO||'');if(n&&n.trim()){USUARIO=n.trim();localStorage.setItem('cayla_user',USUARIO);pintarWho();}}
function toggleLider(){if(ES_LIDER){ES_LIDER=false;PIN='';sessionStorage.removeItem('cayla_pin');pintarLock();toast('Modo Líder desactivado');return;}var p=prompt('PIN de Líder de equipo:');if(p===null)return;run('validarPin',p.trim()).then(function(r){if(r.ok&&String(r.rol).toLowerCase().charAt(0)==='l'){PIN=p.trim();ES_LIDER=true;sessionStorage.setItem('cayla_pin',PIN);pintarLock();toast('Modo Líder · '+r.nombre);if(TAB==='inicio')renderTablero();}else toast('PIN incorrecto o no es de Líder',true);}).catch(function(e){toast(e.message||e,true);});}

function irA(tab){TAB=tab;['inicio','buscar','mover','agregar','etiquetas','alertas'].forEach(function(t){document.getElementById('tab-'+t).classList.toggle('hidden',t!==tab);});document.querySelectorAll('nav button').forEach(function(b){b.classList.toggle('on',b.getAttribute('data-tab')===tab);});renderActual();}
function renderActual(){if(TAB==='inicio')renderTablero();if(TAB==='buscar')renderBuscar();if(TAB==='etiquetas')renderEtiq();if(TAB==='alertas')renderAlertas();if(TAB==='agregar')pintarLock();}

/* tablero */
function renderTablero(){var host=document.getElementById('tablero');host.innerHTML='<div class="spin"></div>';
  run('getResumen',PIN).then(function(r){
    var sr=SEDES.map(function(s){var d=r.porSede[s]||{unidades:0,valorPrecio:0};return '<div class="s"><div class="lbl">'+esc(s)+'</div><div class="num">'+d.unidades+'</div><div class="sv">'+money(d.valorPrecio)+'</div></div>';}).join('');
    var gan=r.esLider?'<div class="kpi wide"><div class="lbl">Ganancia potencial</div><div class="num">'+money(r.gananciaPotencial)+'</div><div class="k-sub">Inventario a costo · '+money(r.valorCosto)+'</div></div>':'';
    var notaP=r.sinPrecio?'<div class="k-sub">'+r.sinPrecio+' prendas con stock sin precio</div>':'';
    var lider=r.esLider?'<div class="row" style="margin:2px 0 16px;flex-wrap:wrap"><button class="btn ghost" onclick="verVentas()">Ventas</button><button class="btn ghost" onclick="verRotacion()">Rotación</button><button class="btn ghost" onclick="verDiario()">Diario</button><button class="btn ghost" onclick="abrirGasto()">Gastos</button><button class="btn ghost" onclick="verEERR()">EERR</button></div>':'';
    var top=r.topBajo.length?r.topBajo.map(mini).join(''):'<div class="empty">Nada por reponer.</div>';
    host.innerHTML='<div class="sederow">'+sr+'</div>'+
      '<div class="kpis">'+
        '<div class="kpi wide"><div class="lbl">Valor del inventario · a precio de venta</div><div class="num">'+money(r.valorPrecio)+'</div>'+notaP+'</div>'+
        gan+
        '<div class="kpi"><div class="lbl">Unidades</div><div class="num">'+r.totalUnidades+'</div></div>'+
        '<div class="kpi"><div class="lbl">Referencias · SKUs</div><div class="num">'+r.totalReferencias+' · '+r.totalSKUs+'</div></div>'+
        '<div class="kpi"><div class="lbl">Bajo stock</div><div class="num rojo">'+r.bajoStock+'</div></div>'+
        '<div class="kpi"><div class="lbl">Estancadas</div><div class="num" style="color:var(--taupe)">'+r.estancados+'</div></div>'+
      '</div>'+lider+
      '<h2 class="sec">Top a reponer</h2>'+top;
  }).catch(function(e){host.innerHTML='<div class="empty">Error: '+esc(e.message||e)+'</div>';});
}
function mini(p){return '<div class="mini" onclick="buscarCod(\''+esc(p.codigo)+'\')"><div><div class="m-ref">'+esc(p.referencia)+'</div><div class="m-sub">'+esc(p.talla)+' · '+esc(p.color)+' · '+esc(p.categoria||'')+'</div></div><div class="m-n rojo">'+p.total+'</div></div>';}
function buscarCod(c){irA('buscar');document.getElementById('q').value=c;renderBuscar();}

/* buscar */
function renderBuscar(){var q=(document.getElementById('q').value||'').trim().toLowerCase();
  var l=CAT.filter(function(p){if(!q)return true;return (p.codigo+' '+p.referencia+' '+p.descripcion+' '+p.talla+' '+p.color+' '+p.categoria+' '+p.genero+' '+p.marca+' '+p.ubicacion).toLowerCase().indexOf(q)>=0;});
  var c=document.getElementById('listaBuscar');
  if(!CAT.length){c.innerHTML='<div class="empty">Aún no hay prendas.</div>';return;}
  if(!l.length){c.innerHTML='<div class="empty">Sin resultados.</div>';return;}
  l.sort(function(a,b){return a.referencia.localeCompare(b.referencia)||a.talla.localeCompare(b.talla);});
  c.innerHTML=l.slice(0,150).map(card).join('');
}
function card(p){
  var thumb=p.foto?'<img class="thumb" src="'+esc(p.foto)+'" onerror="this.replaceWith(Object.assign(document.createElement(\'div\'),{className:\'thumb\',textContent:\''+esc((p.referencia||'?').slice(0,2).toUpperCase())+'\'}))">':'<div class="thumb">'+esc((p.referencia||'?').slice(0,2).toUpperCase())+'</div>';
  var tags=(p.bajo?'<span class="tag bajo">Bajo</span>':'')+(p.estancado?'<span class="tag est">'+(p.diasSinVenta||0)+'d · meta '+p.rotObjetivo+'</span>':'');
  var chips=SEDES.map(function(s){var q=p.stock[s]||0;return '<span class="sc '+(s===SEDE?'cur':'')+'">'+esc(s)+' <b>'+q+'</b></span>';}).join('');

function item(c){return CAT.filter(function(x){return x.codigo===c;})[0];}
function refresca(c,s,n){var p=item(c);if(p){p.stock[s]=n;p.total=SEDES.reduce(function(a,x){return a+(p.stock[x]||0);},0);p.bajo=p.total<=p.stockMin;}if(TAB==='buscar')renderBuscar();else if(TAB==='alertas')renderAlertas();var b=CAT.filter(function(x){return x.bajo;}).length;document.getElementById('alertN').textContent=b?' ('+b+')':'';}
function guard(){if(!SEDE){toast('Elige tu sede arriba',true);pedirSede();return false;}if(!USUARIO){pedirUsuario();return false;}return true;}
function rapido(c,t){if(!guard())return;run('registrarMovimiento',{codigo:c,sede:SEDE,tipo:t,cantidad:1,motivo:'Ajuste rápido',usuario:USUARIO}).then(function(r){refresca(c,SEDE,r.stock);}).catch(function(e){toast(e.message||e,true);});}
/* carrito / venta */
var CARRITO=[];
function abrirCarrito(codigoInicial){if(!guard())return;CARRITO=[];if(codigoInicial)carritoAgregar(codigoInicial,false);renderCarrito();}
function carritoAgregar(c,refrescar){var p=item(c);if(!p){toast('Código no encontrado',true);return;}var stockAqui=p.stock[SEDE]||0;if(stockAqui<=0){toast('Sin stock de '+(p.referencia||c)+' en '+SEDE,true);return;}
  var l=CARRITO.filter(function(x){return x.codigo===c;})[0];var monto=p.oferta>0?p.oferta:p.precio;
  if(l){if(l.cantidad<stockAqui)l.cantidad++;else{toast('No hay más stock en '+SEDE,true);return;}}
  else CARRITO.push({codigo:c,referencia:p.referencia,talla:p.talla,color:p.color,cantidad:1,monto:monto,stockMax:stockAqui});
  if(refrescar!==false)renderCarrito();}
function carritoQuitar(c){CARRITO=CARRITO.filter(function(x){return x.codigo!==c;});renderCarrito();}
function carritoCant(c,delta){var l=CARRITO.filter(function(x){return x.codigo===c;})[0];if(!l)return;var n=l.cantidad+delta;if(n<=0){carritoQuitar(c);return;}if(n>l.stockMax){toast('No hay más stock en '+SEDE,true);return;}l.cantidad=n;renderCarrito();}
function carritoTotal(){return CARRITO.reduce(function(a,l){return a+l.monto*l.cantidad;},0);}
function renderCarrito(){
  var host=document.getElementById('modalHost');
  var filas=CARRITO.length?CARRITO.map(function(l){
    return '<tr><td>'+esc(l.referencia)+' <span style="color:var(--muted)">'+esc(l.talla)+'/'+esc(l.color)+'</span></td>'+
      '<td class="n"><button class="step" onclick="carritoCant(\''+esc(l.codigo)+'\',-1)">−</button> '+l.cantidad+' <button class="step" onclick="carritoCant(\''+esc(l.codigo)+'\',1)">+</button></td>'+
      '<td class="n">'+money(l.monto*l.cantidad)+'</td>'+
      '<td><span class="lnk" onclick="carritoQuitar(\''+esc(l.codigo)+'\')">Quitar</span></td></tr>';
  }).join(''):'<tr><td colspan="4" style="color:var(--muted)">Carrito vacío. Escribe un código para agregar.</td></tr>';
  var tipoSel=document.getElementById('cv-tipo');var esFactura=tipoSel?tipoSel.value==='Factura':false;
  var docVal=document.getElementById('cv-doc')?document.getElementById('cv-doc').value:'';
  var nomVal=document.getElementById('cv-nombre')?document.getElementById('cv-nombre').value:'';
  var pagoVal=document.getElementById('cv-pago')?document.getElementById('cv-pago').value:'Efectivo';
  host.innerHTML='<div class="modal"><div class="sheet"><h3>Nueva venta · '+esc(SEDE)+'</h3>'+
    '<div class="field"><label>Agregar prenda</label><div class="row">'+
      '<input id="cv-cod" placeholder="Código, escanea o busca" autocomplete="off" onkeydown="if(event.key===\'Enter\'){carritoAgregar(this.value.trim());this.value=\'\';}">'+
      '<button class="btn ghost" style="flex:0 0 52px" onclick="abrirScanner(function(v){carritoAgregar(v);})">◲</button></div></div>'+
    '<table class="t"><tr><th>Prenda</th><th class="n">Cant.</th><th class="n">Subtotal</th><th></th></tr>'+filas+'</table>'+
    '<div class="kpi wide" style="margin:14px 0"><div class="lbl">Total</div><div class="num">'+money(carritoTotal())+'</div></div>'+
    '<div class="row">'+
      '<div class="field"><label>Comprobante</label><select id="cv-tipo" onchange="renderCarrito()"><option'+(esFactura?'':' selected')+'>Boleta</option><option'+(esFactura?' selected':'')+'>Factura</option></select></div>'+
      '<div class="field"><label>Pago</label><select id="cv-pago">'+(BOOT&&BOOT.metodosPago||['Efectivo','POS','Yape','Transferencia']).map(function(m){return '<option'+(m===pagoVal?' selected':'')+'>'+esc(m)+'</option>';}).join('')+'</select></div>'+
    '</div>'+
    (esFactura?
      '<div class="row"><div class="field"><label>RUC</label><input id="cv-doc" placeholder="20xxxxxxxxx" value="'+esc(docVal)+'"></div><div class="field"><label>Razón social</label><input id="cv-nombre" value="'+esc(nomVal)+'"></div></div>'
      :'<div class="field"><label>DNI (opcional)</label><input id="cv-doc" placeholder="Solo si el cliente lo pide" value="'+esc(docVal)+'"></div>')+
    '<button class="btn block" onclick="confirmarVenta()" '+(CARRITO.length?'':'disabled')+'>Emitir '+(esFactura?'factura':'boleta')+' · '+money(carritoTotal())+'</button>'+
    '<button class="btn ghost block" style="margin-top:9px" onclick="cerrar()">Cancelar</button></div></div>';
  var ci=document.getElementById('cv-cod');if(ci)ci.focus();
}
function confirmarVenta(){
  if(!CARRITO.length){toast('El carrito está vacío',true);return;}
  var tipo=document.getElementById('cv-tipo').value;var pago=document.getElementById('cv-pago').value;
  var doc=(document.getElementById('cv-doc').value||'').trim();
  var nombre=tipo==='Factura'?(document.getElementById('cv-nombre').value||'').trim():'';
  if(tipo==='Factura'&&(!doc||!nombre)){toast('Factura necesita RUC y razón social',true);return;}
  var payload={sede:SEDE,usuario:USUARIO,metodoPago:pago,tipoComprobante:tipo,
    cliente:{tipoDoc:tipo==='Factura'?'RUC':(doc?'DNI':''),numDoc:doc,nombre:nombre},
    items:CARRITO.map(function(l){return {codigo:l.codigo,cantidad:l.cantidad,monto:l.monto};})};
  run('registrarVenta',payload).then(function(r){
    CARRITO.forEach(function(l){var p=item(l.codigo);if(p){p.stock[SEDE]=(p.stock[SEDE]||0)-l.cantidad;p.total=SEDES.reduce(function(a,s){return a+(p.stock[s]||0);},0);p.bajo=p.total<=p.stockMin;}});
    cerrar();if(TAB==='buscar')renderBuscar();else if(TAB==='alertas')renderAlertas();
    var msg='Venta · '+SEDE+' · '+money(r.montoTotal);
    if(r.comprobante&&r.comprobante.estado==='Aceptado')msg+=' · '+tipo+' '+r.comprobante.serie+'-'+r.comprobante.correlativo;
    else if(r.comprobante&&r.comprobante.estado==='Pendiente')msg+=' · comprobante pendiente (sin conexión a Nubefact), se reintentará';
    else if(r.comprobante&&r.comprobante.estado==='Rechazado')msg+=' · comprobante rechazado, revisa la hoja Comprobantes';
    toast(msg);
  }).catch(function(e){toast(e.message||e,true);});
}
function conteo(c){if(!guard())return;var p=item(c);var a=p?(p.stock[SEDE]||0):0;var f=prompt('Conteo físico de '+c+' en '+SEDE+'\n(sistema: '+a+')');if(f===null||f==='')return;run('ajustarConteo',{codigo:c,sede:SEDE,conteoFisico:Number(f),usuario:USUARIO}).then(function(r){refresca(c,SEDE,r.stock);toast(r.sinCambios?'Sin diferencias':'Ajustado '+(r.delta>0?'+':'')+r.delta);}).catch(function(e){toast(e.message||e,true);});}

function hacerTraslado(){var c=(document.getElementById('tr-cod').value||'').trim();var d=document.getElementById('tr-dst').value;var q=Number(document.getElementById('tr-cant').value);if(!c){toast('Falta el código',true);return;}run('registrarTraslado',{codigo:c,sedeOrigen:SEDE,sedeDestino:d,cantidad:q,usuario:USUARIO}).then(function(r){var p=item(c);if(p){p.stock[r.origen.sede]=r.origen.stock;p.stock[r.destino.sede]=r.destino.stock;p.total=SEDES.reduce(function(a,s){return a+(p.stock[s]||0);},0);p.bajo=p.total<=p.stockMin;}cerrar();if(TAB==='buscar')renderBuscar();toast(q+' · '+SEDE+' → '+d);}).catch(function(e){toast(e.message||e,true);});}

  run('getEstadoResultados',PIN,30).then(function(r){
    var fs=r.sedes.map(function(s){var d=r.porSede[s]||{};return '<tr><td>'+esc(s)+'</td><td class="n">'+money(d.ventas)+'</td><td class="n">'+money(d.cogs)+'</td><td class="n">'+money(d.gastos)+'</td><td class="n"><b>'+money(d.utilidad)+'</b></td></tr>';}).join('');
    document.getElementById('eB').innerHTML='<div class="kpi wide" style="border:1px solid var(--line);border-radius:14px;margin-bottom:14px"><div class="lbl">Utilidad neta · 30 días</div><div class="num">'+money(r.utilidad)+'</div><div class="k-sub">Ventas '+money(r.ventas)+' · Costo mercadería '+money(r.cogs)+' · Gastos '+money(r.gastos)+'</div></div>'+
      '<h2 class="sec">Por sede</h2><table class="t"><tr><th>Sede</th><th class="n">Ventas</th><th class="n">Costo merc.</th><th class="n">Gastos</th><th class="n">Utilidad</th></tr>'+fs+'</table>';
  }).catch(function(e){document.getElementById('eB').innerHTML='<div class="empty">'+esc(e.message||e)+'</div>';});}

/* historial */
function verHist(c){var p=item(c)||{codigo:c};document.getElementById('modalHost').innerHTML='<div class="modal"><div class="sheet"><h3>'+esc(p.referencia||c)+' <span style="color:var(--muted);font-size:14px">'+esc(p.talla||'')+'/'+esc(p.color||'')+'</span></h3><div class="hist" id="hB"><div class="spin"></div></div><button class="btn ghost block" style="margin-top:14px" onclick="cerrar()">Cerrar</button></div></div>';
  run('getHistorial',c,'').then(function(rows){var b=document.getElementById('hB');if(!rows||!rows.length){b.innerHTML='<div class="empty">Sin movimientos.</div>';return;}b.innerHTML=rows.map(function(h){var t=String(h.tipo).toLowerCase();var q=t==='ajuste'?((h.cantidad>0?'+':'−')+Math.abs(h.cantidad)):(t==='salida'?'−':t==='traslado'?'→':'+')+Math.abs(h.cantidad);var lug=t==='traslado'?(esc(h.sede)+'→'+esc(h.sedeDestino)):esc(h.sede);return '<div class="hrow"><div class="ht '+(t==='salida'?'s':'')+'">'+esc(h.tipo)+'</div><div class="hm"><div>'+esc(h.motivo||'—')+' · '+lug+(h.monto?' · '+money(h.monto):'')+'</div><div class="hf">'+esc(h.fecha)+' · '+esc(h.usuario||'—')+'</div></div><div class="hq">'+q+'</div></div>';}).join('');}).catch(function(e){document.getElementById('hB').innerHTML='<div class="empty">'+esc(e.message||e)+'</div>';});}
function cerrar(){document.getElementById('modalHost').innerHTML='';}

/* etiquetas */
function renderEtiq(){var q=(document.getElementById('qEtiq').value||'').trim().toLowerCase();var l=CAT.filter(function(p){if(!q)return true;return (p.codigo+' '+p.referencia+' '+p.talla+' '+p.color).toLowerCase().indexOf(q)>=0;});var c=document.getElementById('listaEtiq');if(!CAT.length){c.innerHTML='<div class="empty">No hay prendas.</div>';return;}l.sort(function(a,b){return a.referencia.localeCompare(b.referencia);});c.innerHTML=l.map(function(p){return '<label class="selrow"><input type="checkbox" '+(SEL[p.codigo]?'checked':'')+' onchange="togSel(\''+esc(p.codigo)+'\',this.checked)"><div><div style="font-weight:500">'+esc(p.referencia)+'</div><div style="font-size:12px;color:var(--muted)">'+esc(p.talla)+'/'+esc(p.color)+' · '+esc(p.codigo)+'</div></div></label>';}).join('');}
function togSel(c,v){if(v)SEL[c]=true;else delete SEL[c];}
function selEtiq(all){var q=(document.getElementById('qEtiq').value||'').trim().toLowerCase();CAT.forEach(function(p){var m=!q||(p.codigo+' '+p.referencia+' '+p.talla+' '+p.color).toLowerCase().indexOf(q)>=0;if(m){if(all)SEL[p.codigo]=true;else delete SEL[p.codigo];}});renderEtiq();}
function imprimirEtiq(){var cods=Object.keys(SEL);if(!cods.length){toast('Marca al menos una prenda',true);return;}if(typeof JsBarcode==='undefined'){toast('No cargó el generador',true);return;}var box=document.getElementById('labels');box.innerHTML='';cods.forEach(function(cod){var p=item(cod);if(!p)return;var d=document.createElement('div');d.className='label';d.innerHTML='<div class="l-ref">'+esc(p.referencia)+'</div><div class="l-var">'+esc(p.talla)+' · '+esc(p.color)+'</div><svg class="bc"></svg>'+((p.oferta||p.precio)?'<div class="l-price">'+money(p.oferta>0?p.oferta:p.precio)+'</div>':'');box.appendChild(d);try{JsBarcode(d.querySelector('.bc'),p.codigo,{format:'CODE128',displayValue:true,fontSize:11,height:34,margin:2,width:1.3});}catch(e){d.querySelector('.bc').outerHTML='<div style="font-size:9px">'+esc(p.codigo)+'</div>';}});toast('Preparando '+cods.length+' etiquetas…');setTimeout(function(){window.print();},350);}

/* escáner */
function abrirScanner(cb){var ov=document.createElement('div');ov.className='overlay';ov.innerHTML='<div id="reader"></div><button class="btn ghost" style="margin-top:16px">Cerrar</button>';document.body.appendChild(ov);function x(){try{if(scanner){scanner.stop().then(function(){scanner.clear();scanner=null;});}}catch(e){}ov.remove();}ov.querySelector('button').onclick=x;if(typeof Html5Qrcode==='undefined'){toast('No cargó el escáner',true);x();return;}scanner=new Html5Qrcode('reader',{verbose:false});scanner.start({facingMode:'environment'},{fps:10,qrbox:{width:250,height:150}},function(t){cb(t);x();},function(){}).catch(function(e){toast('Cámara no disponible',true);x();});}
</script>
